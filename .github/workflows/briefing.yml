name: 每日 SEO/GEO 简报

on:
  schedule:
    - cron: "0 6 * * *"   # 每天 UTC 06:00（北京 14:00）
  workflow_dispatch: {}   # 也可手动触发

permissions:
  contents: write

jobs:
  briefing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install feedparser httpx selectolax
      - name: 生成今日简报
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-2.5-flash
        run: python scripts/build_briefing.py
      - name: 提交
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add web/data/briefings
          git diff --cached --quiet || git commit -m "每日简报 $(date -u +%F)"
          git push
