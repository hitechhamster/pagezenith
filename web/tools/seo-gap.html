<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>内容差距分析 · PageZenith</title>
<link rel="stylesheet" href="/shared/app.css" />
<style>
  /* 配色与字体走 /shared/app.css 的 token（墨绿+暖纸白+衬线） */
  .wrap{max-width:880px;margin:0 auto;padding:28px 20px 100px}
  .head{display:flex;align-items:center;gap:12px;margin-bottom:4px}
  .logo{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));
    display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:16px}
  h1{font-size:20px;font-weight:650;margin:0}
  .sub{color:var(--muted);font-size:13px;margin:6px 0 20px}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
  .bar{padding:16px;display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end}
  .f{display:flex;flex-direction:column;gap:5px}
  .f label{font-size:11px;color:var(--muted);font-weight:550;letter-spacing:.02em}
  input,select{background:#fff;border:1px solid var(--line);border-radius:9px;color:var(--text);
    padding:9px 11px;font-size:13px;outline:none;transition:border .15s,box-shadow .15s}
  input:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accentsoft)}
  #url{width:330px} #keyword{width:190px}
  .check{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);user-select:none;padding-bottom:9px}
  .check input{width:auto;accent-color:var(--accent)}
  button{background:var(--accent);border:none;border-radius:9px;color:#fff;font-weight:600;
    padding:10px 20px;font-size:14px;cursor:pointer;transition:background .15s,transform .05s}
  button:hover{background:#4338ca} button:active{transform:scale(.98)} button:disabled{opacity:.55;cursor:default}
  .status{display:flex;align-items:center;gap:9px;margin:16px 2px;color:var(--muted);font-size:13px;min-height:20px}
  .status.err{color:var(--red)}
  .spin{width:14px;height:14px;border:2px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  .sec{margin-top:16px;padding:18px 20px}
  .sec h2{font-size:15px;margin:0 0 14px;font-weight:620;display:flex;align-items:center;gap:9px}
  .sec h2 .n{background:var(--accentsoft);color:var(--accent);width:24px;height:24px;border-radius:7px;
    display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
  .chips{display:flex;gap:7px;flex-wrap:wrap}
  .chip{background:var(--soft);border:1px solid var(--line);border-radius:7px;padding:4px 11px;font-size:12px;color:var(--text)}
  .chip.green{background:var(--greenbg);border-color:var(--greenline);color:var(--green)}
  .chip.red{background:var(--redbg);border-color:var(--redline);color:var(--red)}
  .pill{display:inline-block;border-radius:20px;padding:2px 11px;font-size:11px;font-weight:600}
  .pill.kind{background:var(--accentsoft);color:var(--accent)}
  .pill.warn{background:var(--amberbg);color:var(--amber);border:1px solid var(--amberline)}
  .pill.ok{background:var(--greenbg);color:var(--green);border:1px solid var(--greenline)}
  .badge{background:var(--accentsoft);color:var(--accent);border-radius:7px;padding:4px 11px;font-size:12px;font-weight:600}
  ul{margin:8px 0;padding-left:20px} li{margin:4px 0}
  .muted{color:var(--muted)} .small{font-size:12px}
  .callout{margin-top:16px;padding:16px 18px;border-radius:var(--radius);border:1px solid var(--line);box-shadow:var(--shadow);background:var(--card)}
  .callout.warn{background:var(--amberbg);border-color:var(--amberline)}
  .callout.ok{background:var(--greenbg);border-color:var(--greenline)}
  .callout .h{font-weight:650;font-size:14px;margin-bottom:6px;display:flex;gap:8px;align-items:center}
  .callout .body{font-size:13px;line-height:1.75}
  .comp{border:1px solid var(--line);border-radius:11px;padding:12px 14px;margin-bottom:9px;background:#fff}
  .comp .top{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .comp .t{font-weight:600;font-size:13px}
  .comp a{color:var(--accent);text-decoration:none;font-size:12px;word-break:break-all}
  .comp .meta{color:var(--faint);font-size:12px;margin-top:3px}
  .comp .lack{color:var(--red)}
  .metrics{display:flex;gap:10px;flex-wrap:wrap;margin:10px 0}
  .metric{background:var(--soft);border-radius:10px;padding:10px 14px;min-width:96px}
  .metric .k{font-size:11px;color:var(--muted)} .metric .v{font-size:19px;font-weight:680;margin-top:2px}
  .supp{border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:0 11px 11px 0;padding:13px 15px;margin-bottom:11px;background:#fff}
  .supp .h{font-weight:650;margin-bottom:8px}
  .supp .body{background:var(--soft);border-radius:9px;padding:12px;line-height:1.85;white-space:pre-wrap}
  .supp .why{color:var(--muted);font-size:12px;margin-top:8px}
  .supp .copy{background:#fff;border:1px solid var(--line);color:var(--muted);font-weight:500;padding:5px 12px;font-size:12px;float:right;border-radius:8px}
  .supp .copy:hover{background:var(--soft)}
  .ph{color:var(--faint);font-size:12px}
  .summary{padding:20px;margin-top:16px;background:linear-gradient(180deg,#fbfbff,#fff)}
  .sumtop{display:flex;align-items:center;gap:18px}
  .ring{width:74px;height:74px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;
    flex-shrink:0;color:#fff;font-weight:700}
  .ring .nv{font-size:24px;line-height:1} .ring .nl{font-size:10px;opacity:.9}
  .sumtop .grade{font-size:16px;font-weight:680;margin-bottom:3px}
  .sumtop .q{font-size:13px;color:var(--muted);line-height:1.6}
  .twocol{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px}
  @media(max-width:620px){.twocol{grid-template-columns:1fr}}
  .blk .bt{font-size:12px;font-weight:650;margin-bottom:6px;color:var(--muted)}
  .verdict{margin-top:14px;padding:12px 14px;background:var(--accentsoft);border-radius:10px;font-size:13px;line-height:1.7}
  .geobar{display:flex;align-items:center;gap:10px;margin:7px 0}
  .geobar .gl{width:120px;font-size:12px;color:var(--text);flex-shrink:0}
  .geobar .track{flex:1;height:7px;background:var(--soft);border-radius:5px;overflow:hidden}
  .geobar .fill{height:100%;background:var(--accent);border-radius:5px}
  .geobar .gv{width:30px;text-align:right;font-size:12px;color:var(--muted)}
  .geobar .gn{flex-basis:100%;font-size:11px;color:var(--faint);margin-left:130px;margin-top:-2px}
  .modetabs{display:flex;gap:6px;margin:6px 0 10px}
  .mtab{background:var(--card);border:1px solid var(--line);color:var(--muted);border-radius:8px;padding:6px 14px;font-size:13px;cursor:pointer;width:auto}
  .mtab.on{background:var(--accentsoft);color:var(--accent);border-color:transparent;font-weight:600}
  textarea#keywords{width:100%;resize:vertical;font:inherit;padding:8px 10px;border:1px solid var(--line);border-radius:8px;background:var(--card);color:var(--text);line-height:1.6}
  .krow{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--line);font-size:13px}
  .krow .kw{flex:1}
  .krow .rk{font-size:12px;padding:2px 9px;border-radius:7px}
  .krow .rk.in{background:#e6f4ea;color:#137333} .krow .rk.out{background:var(--soft);color:var(--muted)}
  .gaprow{display:flex;align-items:baseline;gap:8px;padding:4px 0;font-size:13.5px}
  .gaprow .wt{font-size:11px;color:var(--accent);background:var(--accentsoft);border-radius:6px;padding:1px 7px;flex-shrink:0}
  .comp .kwfor{display:flex;flex-wrap:wrap;gap:5px;margin:5px 0}
  .comp .kwfor span{font-size:11px;background:var(--accentsoft);color:var(--accent);border-radius:6px;padding:1px 8px}
  .viewbtn{margin-left:auto;background:transparent;border:1px solid var(--line);color:var(--muted);border-radius:6px;height:22px;padding:0 8px;font-size:11px;cursor:pointer;width:auto;flex-shrink:0;display:inline-flex;align-items:center;gap:4px}
  .viewbtn:hover{border-color:var(--accent);color:var(--accent)}
  .tv-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50;display:none}
  .tv-card{position:fixed;z-index:51;top:5vh;left:50%;transform:translateX(-50%);width:min(760px,92vw);max-height:88vh;background:var(--card);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);display:none;flex-direction:column}
  .tv-head{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--line)}
  .tv-head .tt{flex:1;font-weight:600;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .tv-head .cnt{font-size:12px;color:var(--faint)}
  .tv-x{cursor:pointer;border:none;background:transparent;color:var(--muted);font-size:18px;width:auto;padding:0 4px;line-height:1}
  .tv-body{padding:14px 16px;overflow:auto;white-space:pre-wrap;word-break:break-word;font-size:13px;line-height:1.75;color:var(--text)}
</style>
</head>
<body>
<div class="nav">
  <div class="logo">PZ</div><a class="brand" href="/" style="color:var(--text)">PageZenith</a>
  <a class="navlink" href="/">← 全部工具</a>
  <div class="grow"></div>
  <button class="keybtn" id="keybtn" onclick="SEOKEYS.open()">API Key 设置</button>
</div>
<div class="wrap">
  <div class="head">
    <h1 style="font-size:22px;margin:0">内容差距分析</h1>
  </div>
  <div class="sub">输入目标网址 + 关键词，AI 对比前 10：页面类型匹配、语义意图、逐页差距、LSI 覆盖、GEO，并给出可直接粘贴的增补段落。</div>

  <div class="modetabs">
    <button id="tab-single" class="mtab on" onclick="setMode('single')">单关键词</button>
    <button id="tab-batch" class="mtab" onclick="setMode('batch')">批量（关键词簇）</button>
  </div>

  <div class="panel bar">
    <div class="f"><label>目标网址</label><input id="url" placeholder="https://..." /></div>
    <div class="f" id="kwSingle"><label>关键词</label><input id="keyword" placeholder="如 bathroom feng shui" /></div>
    <div class="f grow" id="kwBatch" style="display:none"><label>关键词簇（每行一个，最多 10 个）</label><textarea id="keywords" rows="4" placeholder="forex broker scam&#10;forex regulation&#10;how to verify forex broker"></textarea></div>
    <div class="f"><label>地区 / 语言</label>
      <select id="region">
        <option value="us-en">美国 / English</option>
        <option value="cn-zh">中国 / 中文</option>
        <option value="hk-zh">香港 / 中文</option>
        <option value="uk-en">英国 / English</option>
      </select>
    </div>
    <label class="check"><input type="checkbox" id="browser" checked />本地浏览器抓取</label>
    <label class="check" title="需在右上角设置里填 Tavily key；用它把竞品页解析成更干净的正文"><input type="checkbox" id="tavily" />Tavily 解析（更干净）</label>
    <button id="run">开始分析</button>
  </div>
  <div class="sub small" id="batchHint" style="display:none;margin-top:-6px">批量模式：综合看你的页/站在整组关键词上的差距与该补的内容；跨关键词自动去重（同一竞品页只抓一次），Reddit 仅取前 3 个词以省额度。</div>

  <div id="status" class="status"></div>
  <div id="report"></div>
</div>

<div class="tv-bg" id="tvBg" onclick="closeText()"></div>
<div class="tv-card" id="tvCard" role="dialog" aria-modal="true">
  <div class="tv-head">
    <span class="tt" id="tvTitle"></span>
    <span class="cnt" id="tvCount"></span>
    <button class="copy" id="tvCopy">复制全文</button>
    <button class="tv-x" onclick="closeText()" title="关闭">✕</button>
  </div>
  <div class="tv-body" id="tvBody"></div>
</div>

<script>
const REGION={"us-en":[2840,"en"],"cn-zh":[2156,"zh"],"hk-zh":[2344,"zh"],"uk-en":[2826,"en"]};
const KIND={article:"信息型文章",product_list:"商品集合页",product_detail:"产品详情页",category:"分类页",homepage:"首页",forum:"论坛/问答",review:"测评页",tool:"工具页",other:"其它"};
const $=id=>document.getElementById(id);
const E=(t,c,x)=>{const e=document.createElement(t);if(c)e.className=c;if(x!=null)e.textContent=x;return e;};
const clr=n=>{n.innerHTML="";};
function setStatus(m,err,busy){const s=$("status");clr(s);s.className="status"+(err?" err":"");if(busy)s.append(E("div","spin"));if(m)s.append(E("span",null,m));}

let SEC={}, suppCleared=false;
function panel(){const d=E("div","panel sec");return d;}
function secBox(n,title){const s=panel();const h=E("h2");h.append(E("span","n",String(n)),E("span",null,title));s.append(h);const body=E("div");s.append(body);return [s,body];}
function metric(k,v){const m=E("div","metric");m.append(E("div","k",k),E("div","v",String(v)));return m;}

function skeleton(){
  const root=$("report"); root.innerHTML=""; SEC={}; suppCleared=false; redditDone=false;
  SEC.overview=panel(); SEC.overview.append(E("div","ph","准备中…")); root.append(SEC.overview);
  SEC.summary=E("div"); root.append(SEC.summary);                      // AI 总结（置顶，最后填）
  SEC.match=E("div"); root.append(SEC.match);                          // 页面类型 callout 占位
  let s,b;
  [s,b]=secBox(1,"关键词语义分析"); SEC.sem=b; b.append(E("div","ph","分析中…")); root.append(s);
  [s,b]=secBox(2,"前10分析（每页主要内容 + 我们缺的）"); SEC.comp=b; b.append(E("div","ph","逐页抓取中，完成一个显示一个…")); root.append(s);
  SEC.targetWrap=panel(); SEC.targetWrap.append(E("h2",null,"我们的页面")); SEC.target=E("div"); SEC.target.append(E("div","ph","抓取中…")); SEC.targetWrap.append(SEC.target); root.append(SEC.targetWrap);
  [s,b]=secBox(3,"LSI 语义词分析（覆盖检测）"); SEC.lsi=b; b.append(E("div","ph","等待中…")); root.append(s);
  [s,b]=secBox("AI","GEO 分析（面向 AI 生成式搜索引擎）"); SEC.geo=b; b.append(E("div","ph","等待中…")); root.append(s);
  [s,b]=secBox("R","Reddit 真实讨论（真实用户在聊什么 · 高权重融入增补）"); SEC.reddit=b; b.append(E("div","ph","正在抓取 Reddit 讨论…")); root.append(s);
  [s,b]=secBox(4,"增补段落（可直接粘贴，跟随页面语言）"); SEC.supp=b; b.append(E("div","ph","等待中…")); root.append(s);
}

// 查看竞品抓取原文（可复制）
let tvText="";
function openText(title,text){
  tvText=text||"";
  $("tvTitle").textContent=title||"竞品原文";
  $("tvCount").textContent=tvText?(tvText.length+" 字符"):"";
  $("tvBody").textContent=tvText||"（未获取到正文）";
  $("tvBody").scrollTop=0;
  $("tvBg").style.display="block"; $("tvCard").style.display="flex";
}
function closeText(){ $("tvBg").style.display="none"; $("tvCard").style.display="none"; }
$("tvCopy").onclick=()=>{ if(!tvText)return; navigator.clipboard.writeText(tvText); const b=$("tvCopy"); b.textContent="已复制 ✓"; setTimeout(()=>b.textContent="复制全文",1500); };
document.addEventListener("keydown",e=>{ if(e.key==="Escape") closeText(); });
function viewBtn(title,text){ const b=E("button","viewbtn"); b.append(document.createTextNode("⧉ 原文")); b.title="查看抓取到的竞品原文（可复制）"; b.onclick=()=>openText(title,text); return b; }

let MODE="single";
function setMode(m){
  MODE=m;
  $("tab-single").classList.toggle("on",m==="single");
  $("tab-batch").classList.toggle("on",m==="batch");
  $("kwSingle").style.display=m==="single"?"":"none";
  $("kwBatch").style.display=m==="batch"?"":"none";
  $("batchHint").style.display=m==="batch"?"":"none";
}
$("run").addEventListener("click",()=>MODE==="batch"?runBatch():run());

async function run(){
  const target_url=$("url").value.trim();
  const keyword=$("keyword").value.trim();
  const [location_code,language_code]=REGION[$("region").value];
  const fetch_mode=$("browser").checked?"browser":"httpx";
  if(!/^https?:/.test(target_url)) return setStatus("目标网址需为 http/https。",true);
  if(!keyword) return setStatus("请填写关键词。",true);
  if(!SEOKEYS.hasKeys()){ setStatus("请先在右上角「API Key 设置」填写 OpenRouter 与 SerpApi key。",true); SEOKEYS.open(); return; }

  $("run").disabled=true; skeleton();
  setStatus("分析中…结果会逐块出现，请勿关闭本页。",false,true);
  let total=0, got=0;
  try{
    const resp=await fetch("/api/seo-gap/report_stream",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({keyword,target_url,location_code,language_code,fetch_mode,use_tavily:$("tavily").checked,...SEOKEYS.get()})});
    if(!resp.ok) throw new Error("后端 "+resp.status+"："+(await resp.text()).slice(0,300));
    const reader=resp.body.getReader(); const dec=new TextDecoder(); let buf="";
    while(true){
      const {done,value}=await reader.read(); if(done) break;
      buf+=dec.decode(value,{stream:true});
      let i;
      while((i=buf.indexOf("\n\n"))>=0){
        const line=buf.slice(0,i).trim(); buf=buf.slice(i+2);
        if(!line.startsWith("data:")) continue;
        const ev=JSON.parse(line.slice(5).trim());
        if(ev.type==="meta"){ total=ev.total_competitors; handleMeta(ev); }
        else if(ev.type==="semantics") handleSem(ev.data);
        else if(ev.type==="target") handleTarget(ev.data);
        else if(ev.type==="competitor"){ got++; handleComp(ev.data); setStatus(`分析中…竞品 ${got}/${total} 已完成`,false,true); }
        else if(ev.type==="page_match") handleMatch(ev.data);
        else if(ev.type==="geo") handleGeo(ev.data);
        else if(ev.type==="reddit") handleReddit(ev.data);
        else if(ev.type==="summary") handleSummary(ev.data);
        else if(ev.type==="lsi") handleLsi(ev.data);
        else if(ev.type==="supplement") handleSupp(ev.data);
        else if(ev.type==="done"){ redditFallback(); setStatus("分析完成 ✓"); }
        else if(ev.type==="error") setStatus("错误："+ev.message,true);
      }
    }
  }catch(e){ setStatus(String(e),true); }
  finally{ $("run").disabled=false; }
}

// ---------- 批量模式 ----------
function skeletonBatch(){
  const root=$("report"); root.innerHTML=""; SEC={}; suppCleared=false; redditDone=false;
  SEC.summary=E("div"); root.append(SEC.summary);
  let s,b;
  [s,b]=secBox("K","关键词排名（目标页在每个词的位置）"); SEC.kranks=b; b.append(E("div","ph","查询中…")); root.append(s);
  [s,b]=secBox(1,"核心竞品（跨关键词去重 · 命中越多越是对手）"); SEC.comp=b; b.append(E("div","ph","抓取中，完成一个显示一个…")); root.append(s);
  [s,b]=secBox(2,"综合内容缺口（跨竞品汇总，权重=多少竞品覆盖）"); SEC.gaps=b; b.append(E("div","ph","等待中…")); root.append(s);
  SEC.targetWrap=panel(); SEC.targetWrap.append(E("h2",null,"我们的页面")); SEC.target=E("div"); SEC.target.append(E("div","ph","抓取中…")); SEC.targetWrap.append(SEC.target); root.append(SEC.targetWrap);
  [s,b]=secBox(3,"LSI 语义词（整组词并集，覆盖检测）"); SEC.lsi=b; b.append(E("div","ph","等待中…")); root.append(s);
  [s,b]=secBox("R","Reddit 真实讨论（簇级 · 高权重融入增补）"); SEC.reddit=b; b.append(E("div","ph","抓取 Reddit 讨论…")); root.append(s);
  [s,b]=secBox(4,"综合增补段落（覆盖整组词，可直接粘贴）"); SEC.supp=b; b.append(E("div","ph","等待中…")); root.append(s);
}

async function runBatch(){
  const target_url=$("url").value.trim();
  const seen=new Set();
  const keywords=$("keywords").value.split("\n").map(x=>x.trim()).filter(x=>x&&!seen.has(x.toLowerCase())&&seen.add(x.toLowerCase())).slice(0,10);
  const [location_code,language_code]=REGION[$("region").value];
  const fetch_mode=$("browser").checked?"browser":"httpx";
  if(!/^https?:/.test(target_url)) return setStatus("目标网址需为 http/https。",true);
  if(!keywords.length) return setStatus("请至少输入一个关键词（每行一个）。",true);
  if(!SEOKEYS.hasKeys()){ setStatus("请先在右上角「API Key 设置」填写 OpenRouter 与 SerpApi key。",true); SEOKEYS.open(); return; }

  $("run").disabled=true; skeletonBatch();
  setStatus(`批量分析 ${keywords.length} 个关键词…结果逐块出现，请勿关闭本页。`,false,true);
  try{
    const resp=await fetch("/api/seo-gap/batch_stream",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({keywords,target_url,location_code,language_code,fetch_mode,use_tavily:$("tavily").checked,...SEOKEYS.get()})});
    if(!resp.ok) throw new Error("后端 "+resp.status+"："+(await resp.text()).slice(0,300));
    const reader=resp.body.getReader(); const dec=new TextDecoder(); let buf="";
    while(true){
      const {done,value}=await reader.read(); if(done) break;
      buf+=dec.decode(value,{stream:true});
      let i;
      while((i=buf.indexOf("\n\n"))>=0){
        const line=buf.slice(0,i).trim(); buf=buf.slice(i+2);
        if(!line.startsWith("data:")) continue;
        const ev=JSON.parse(line.slice(5).trim());
        if(ev.type==="target") handleTarget(ev.data);
        else if(ev.type==="meta") handleBatchMeta(ev);
        else if(ev.type==="competitor") handleBatchComp(ev.data);
        else if(ev.type==="gaps") handleGaps(ev.data);
        else if(ev.type==="lsi") handleLsi(ev.data);
        else if(ev.type==="reddit") handleReddit(ev.data);
        else if(ev.type==="supplement") handleSupp(ev.data);
        else if(ev.type==="summary") handleSummary(ev.data);
        else if(ev.type==="done"){ redditFallback(); setStatus("批量分析完成 ✓"); }
        else if(ev.type==="error") setStatus("错误："+ev.message,true);
      }
    }
  }catch(e){ setStatus(String(e),true); }
  finally{ $("run").disabled=false; }
}

function handleBatchMeta(m){
  clr(SEC.kranks);
  SEC.kranks.append(E("div","muted small",`共 ${m.keywords.length} 个关键词 · 跨词去重后 ${m.unique_competitors} 个不同竞品（取核心若干抓取）`));
  (m.keywords||[]).forEach(k=>{
    const row=E("div","krow");
    row.append(E("span","kw",k.keyword));
    row.append(E("span","rk "+(k.in_top_10?"in":"out"), k.in_top_10?("#"+k.rank):"未进前10"));
    SEC.kranks.append(row);
  });
}
function handleBatchComp(c){
  if(SEC.comp.firstChild && SEC.comp.firstChild.classList && SEC.comp.firstChild.classList.contains("ph")) clr(SEC.comp);
  const box=E("div","comp");
  const top=E("div","top");
  top.append(E("span","t",c.title||c.url));
  if(c.fetched && c.page_kind) top.append(E("span","pill kind",KIND[c.page_kind]||c.page_kind));
  top.append(E("span","pill","命中 "+c.keyword_count+" 词 · 最好 #"+c.best_rank));
  if(c.fetched && c.full_text) top.append(viewBtn(c.title||c.url, c.full_text));
  box.append(top);
  const a=E("a",null,c.url); a.href=c.url; a.target="_blank"; box.append(a);
  if((c.ranks_for||[]).length){const kf=E("div","kwfor");c.ranks_for.forEach(k=>kf.append(E("span",null,k)));box.append(kf);}
  if(!c.fetched){ box.append(E("div","meta","（抓取失败 / 被反爬，已跳过）")); SEC.comp.append(box); return; }
  box.append(E("div","meta",`字数 ${c.word_count}`));
  if((c.we_lack||[]).length){box.append(E("div","small lack","我们缺："));const ul=E("ul");c.we_lack.forEach(x=>ul.append(E("li","lack",x)));box.append(ul);}
  SEC.comp.append(box);
}
function handleGaps(list){
  clr(SEC.gaps);
  if(!list.length){ SEC.gaps.append(E("div","muted small","未发现明显共性缺口。")); return; }
  list.forEach(g=>{
    const row=E("div","gaprow");
    row.append(E("span","wt","×"+g.weight));
    row.append(E("span",null,g.text));
    SEC.gaps.append(row);
  });
}
function handleMeta(m){
  clr(SEC.overview);
  SEC.overview.append(E("div",null,`关键词「${m.keyword}」`));
  const u=E("div","muted small"); u.style.wordBreak="break-all"; u.textContent="目标："+m.target_url; SEC.overview.append(u);
  SEC.overview.append(E("div","muted small",(m.in_top_10?`本页排名 #${m.rank}`:"本页未进前10")+` · 待分析竞品 ${m.total_competitors}`));
}
function handleSem(ks){
  clr(SEC.sem);
  const row=E("div","chips"); row.append(E("span","badge","意图："+ks.intent_type));
  if(ks.expected_format) row.append(E("span","chip","期望格式："+ks.expected_format));
  SEC.sem.append(row);
  if(ks.summary) SEC.sem.append(E("div","muted small",ks.summary));
  const ul=E("ul"); (ks.user_wants||[]).forEach(w=>ul.append(E("li",null,w))); SEC.sem.append(ul);
}
function handleTarget(st){
  clr(SEC.target);
  const row=E("div","chips"); row.style.marginBottom="6px";
  if(st.page_kind) row.append(E("span","pill kind",KIND[st.page_kind]||st.page_kind));
  if(st.lang) row.append(E("span","chip","页面语言："+(st.lang==="zh"?"中文":st.lang==="en"?"英文":st.lang)));
  if(st.text_adequacy) row.append(E("span","chip","正文："+st.text_adequacy));
  SEC.target.append(row);
  if(st.visual_summary) SEC.target.append(E("div","muted small","视觉：" + st.visual_summary));
  const mt=E("div","metrics"); mt.append(metric("字数",st.word_count),metric("图片",st.image_count),metric("论点数",st.claim_count)); SEC.target.append(mt);
  if((st.main_content||[]).length){const m=E("div","small muted");m.textContent="主要内容："+st.main_content.join(" / ");SEC.target.append(m);}
}
function handleComp(c){
  if(SEC.comp.firstChild && SEC.comp.firstChild.classList && SEC.comp.firstChild.classList.contains("ph")) clr(SEC.comp);
  const box=E("div","comp");
  const top=E("div","top");
  top.append(E("span","t",`#${c.rank} ${c.title||c.url}`));
  if(c.fetched && c.page_kind) top.append(E("span","pill kind",KIND[c.page_kind]||c.page_kind));
  if(c.fetched && c.full_text) top.append(viewBtn(c.title||c.url, c.full_text));
  box.append(top);
  const a=E("a",null,c.url); a.href=c.url; a.target="_blank"; box.append(a);
  if(!c.fetched){ box.append(E("div","meta","（抓取失败 / 被反爬，已跳过）")); SEC.comp.append(box); return; }
  box.append(E("div","meta",`字数 ${c.word_count} · 图片 ${c.image_count}`));
  if((c.main_content||[]).length){const m=E("div","small");m.append(E("span","muted","主要内容："));m.append(document.createTextNode(c.main_content.join(" / ")));box.append(m);}
  if((c.we_lack||[]).length){box.append(E("div","small lack","我们缺："));const ul=E("ul");c.we_lack.forEach(x=>ul.append(E("li","lack",x)));box.append(ul);}
  SEC.comp.append(box);
}
function handleMatch(pm){
  clr(SEC.match);
  const box=E("div","callout "+(pm.mismatch?"warn":(pm.target_kind===pm.dominant_kind?"ok":"")));
  box.append(E("div","h",(pm.mismatch?"⚠ ":"")+"页面类型匹配"));
  box.append(E("div","body",pm.verdict));
  const counts=Object.entries(pm.competitor_kinds||{}).map(([k,v])=>`${k}×${v}`).join("　");
  if(counts) box.append(E("div","muted small","前10构成："+counts));
  SEC.match.append(box);
}
function scoreColor(v){ return v>=75?"#15a06b":v>=50?"#c9820a":"#dc4b4b"; }
function handleSummary(s){
  clr(SEC.summary);
  const box=E("div","panel summary");
  const top=E("div","sumtop");
  const ring=E("div","ring"); ring.style.background=scoreColor(s.score);
  ring.append(E("div","nv",String(s.score)),E("div","nl","质量分")); top.append(ring);
  const info=E("div");
  info.append(E("div","grade","AI 总结 · "+(s.grade||"")));
  if(s.quality) info.append(E("div","q",s.quality));
  top.append(info); box.append(top);
  const cols=E("div","twocol");
  const sb=E("div","blk"); sb.append(E("div","bt","亮点")); const su=E("ul");(s.strengths||[]).forEach(x=>su.append(E("li",null,x)));sb.append(su);
  const gb=E("div","blk"); gb.append(E("div","bt","与前10的主要差异")); const gu=E("ul");(s.gaps||[]).forEach(x=>gu.append(E("li",null,x)));gb.append(gu);
  cols.append(sb,gb); box.append(cols);
  if(s.verdict) box.append(E("div","verdict",s.verdict));
  SEC.summary.append(box);
}
function handleGeo(g){
  clr(SEC.geo);
  const head=E("div"); head.style.display="flex"; head.style.alignItems="center"; head.style.gap="10px"; head.style.marginBottom="6px";
  const pill=E("span","pill"); pill.style.background=scoreColor(g.score)+"22"; pill.style.color=scoreColor(g.score); pill.textContent="GEO 得分 "+g.score;
  head.append(pill); if(g.summary) head.append(E("span","muted small",g.summary));
  SEC.geo.append(head);
  (g.dimensions||[]).forEach(d=>{
    const row=E("div","geobar");
    row.append(E("div","gl",d.name));
    const tr=E("div","track"); const fl=E("div","fill"); fl.style.width=Math.max(3,d.score)+"%"; fl.style.background=scoreColor(d.score); tr.append(fl); row.append(tr);
    row.append(E("div","gv",String(d.score)));
    if(d.note) row.append(E("div","gn",d.note));
    SEC.geo.append(row);
  });
  if((g.recommendations||[]).length){ SEC.geo.append(E("div","bt","优化建议（面向 AI 答案引擎）")); const ul=E("ul"); g.recommendations.forEach(x=>ul.append(E("li",null,x))); SEC.geo.append(ul); }
}
function handleLsi(lsi){
  clr(SEC.lsi);
  SEC.lsi.append(E("div","muted small",`覆盖 ${lsi.covered_count} · 缺失 ${lsi.missing_count} · 来源：下拉 / PAA / 相关搜索`));
  const chips=E("div","chips"); chips.style.marginTop="9px";
  (lsi.terms||[]).forEach(t=>{const c=E("span","chip "+(t.covered?"green":"red"),(t.covered?"✓ ":"✗ ")+t.term);c.title="来源："+t.source;chips.append(c);});
  SEC.lsi.append(chips);
}
function handleReddit(r){
  clr(SEC.reddit); redditDone=true;
  SEC.reddit.append(E("div","muted small",`来源 ${r.thread_count} 帖 · ${r.comment_count} 条评论 · 真实用户需求已按最高权重融入下方增补段落`));
  if(r.summary){ const sm=E("div",null,r.summary); sm.style.margin="6px 0 10px"; SEC.reddit.append(sm); }
  (r.themes||[]).forEach(t=>{
    const box=E("div","callout"); box.style.margin="8px 0";
    box.append(E("div","h",t.name));
    if(t.summary) box.append(E("div","body",t.summary));
    if((t.pain_points||[]).length){const c=E("div","chips");c.style.marginTop="6px";t.pain_points.forEach(p=>c.append(E("span","chip",p)));box.append(c);}
    (t.quotes||[]).forEach(q=>{const e=E("div","muted small");e.style.fontStyle="italic";e.style.marginTop="4px";e.textContent="“"+q+"”";box.append(e);});
    SEC.reddit.append(box);
  });
  if((r.content_angles||[]).length){ SEC.reddit.append(E("div","bt","真实用户想要、你该覆盖的角度")); const ul=E("ul"); r.content_angles.forEach(x=>ul.append(E("li",null,x))); SEC.reddit.append(ul); }
  if((r.unmet_needs||[]).length){ SEC.reddit.append(E("div","bt","反复问、却常被忽略的点")); const ul=E("ul"); r.unmet_needs.forEach(x=>ul.append(E("li","lack",x))); SEC.reddit.append(ul); }
  if((r.threads||[]).length){
    SEC.reddit.append(E("div","bt","来源帖"));
    const tl=E("div"); tl.style.display="grid"; tl.style.gap="4px";
    r.threads.forEach(t=>{const a=E("a",null,`r/${t.subreddit} · ${t.score}↑ · ${t.num_comments}💬 — ${t.title}`);a.href=t.url;a.target="_blank";a.rel="noopener";a.className="small";a.style.color="var(--accent)";tl.append(a);});
    SEC.reddit.append(tl);
  }
}
let redditDone=false;
function redditFallback(){ if(!redditDone && SEC.reddit){ clr(SEC.reddit); SEC.reddit.append(E("div","muted small","未找到相关 Reddit 讨论（或该词在 Reddit 上讨论较少 / 已跳过）。")); } }
function handleSupp(sp){
  if(!suppCleared){ clr(SEC.supp); suppCleared=true; }
  const box=E("div","supp");
  const cp=E("button","copy","复制"); cp.onclick=()=>{navigator.clipboard.writeText(sp.heading+"\n"+sp.body);cp.textContent="已复制";}; box.append(cp);
  box.append(E("div","h","＋ "+sp.heading));
  box.append(E("div","body",sp.body));
  if(sp.reason) box.append(E("div","why","补这段的理由："+sp.reason));
  SEC.supp.append(box);
}
</script>
