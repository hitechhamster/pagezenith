<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>文章质量检测 · PageZenith</title>
<link rel="stylesheet" href="/shared/app.css" />
<style>
  .layout{display:grid;grid-template-columns:1fr 260px;gap:16px;align-items:start}
  @media(max-width:760px){.layout{grid-template-columns:1fr}}
  .ed-wrap{position:relative;background:var(--card);border:1px solid var(--line);border-radius:var(--radius-lg);min-height:64vh}
  .ed-common{margin:0;border:0;padding:32px 40px;font-family:var(--font-read),Georgia,"Songti SC","Microsoft YaHei",serif;
    font-size:18px;line-height:1.95;white-space:pre-wrap;word-break:break-word;overflow-wrap:break-word}
  #backdrop{position:absolute;inset:0;color:var(--text);pointer-events:none;overflow:auto}
  #editor{position:relative;width:100%;height:100%;min-height:64vh;background:transparent;color:transparent;
    caret-color:var(--accent);resize:vertical;outline:none;display:block}
  .toolbar{display:flex;gap:8px;align-items:center;margin:10px 0 16px;flex-wrap:wrap}
  .toolbar input{flex:1;min-width:200px;max-width:420px}
  .btn-ghost{background:transparent;border:1px solid var(--line);color:var(--text)}
  .btn-ghost:hover{background:var(--soft);border-color:var(--line)}
  .toolbar .hint{font-size:12px;color:var(--faint)}
  #editor::placeholder{color:var(--faint)}
  .s-hard{background:#fdeca6;border-radius:2px}
  .s-vhard{background:#f7c4bd;border-radius:2px}
  .w-adv{background:#cfe0fb;border-radius:2px}
  .w-pass{background:#cdeccf;border-radius:2px}
  .w-cplx{background:#e6d8f2;border-radius:2px}
  .apply{background:transparent;border:1px solid var(--accent);color:var(--accent);font-size:12px;padding:3px 10px;border-radius:7px;cursor:pointer;margin-left:6px}
  .apply:hover{background:var(--accentsoft)}
  .side{position:sticky;top:16px;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px}
  .grade{text-align:center;padding:8px 0 12px;border-bottom:1px solid var(--line);margin-bottom:12px}
  .grade .v{font-size:30px;font-weight:700;line-height:1} .grade .l{font-size:12px;color:var(--muted);margin-top:4px}
  .srow{display:flex;align-items:center;gap:8px;font-size:13px;margin:8px 0}
  .srow .sw{width:13px;height:13px;border-radius:3px;flex-shrink:0}
  .srow .n{margin-left:auto;font-weight:600;font-variant-numeric:tabular-nums}
  .meta{font-size:12px;color:var(--muted);margin:4px 0}
  .aibtn{margin-top:14px;width:100%}
  .sec{margin-top:16px;padding:16px 18px}
  .sec h2{font-size:15px;margin:0 0 12px;font-weight:620;display:flex;align-items:center;gap:9px}
  .sec h2 .n{background:var(--accentsoft);color:var(--accent);width:24px;height:24px;border-radius:7px;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
  .ring{width:64px;height:64px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;font-weight:700;flex-shrink:0}
  .ring .nv{font-size:22px;line-height:1}.ring .nl{font-size:9px}
  .rw{border:1px solid var(--line);border-radius:9px;padding:10px 12px;margin-bottom:8px}
  .rw .o{color:var(--muted);font-size:13px;text-decoration:line-through}
  .rw .n2{font-size:14px;margin-top:4px}
  .wat{border-left:3px solid var(--amber);background:var(--amberbg);border-radius:0 8px 8px 0;padding:8px 11px;margin-bottom:7px;font-size:13px}
  .wat .q{color:var(--amber)} .wat .sg{color:var(--muted);font-size:12px;margin-top:3px}
  .tsug{border:1px solid var(--line);border-radius:9px;padding:9px 12px;margin-bottom:7px}
  .tsug .t{font-weight:600} .tsug .copy{float:right;background:#fff;border:1px solid var(--line);color:var(--muted);font-size:12px;padding:3px 9px;border-radius:7px;cursor:pointer}
  .tsug .w{color:var(--muted);font-size:12px;margin-top:3px}
  .dim{display:flex;align-items:center;gap:10px;margin:6px 0;font-size:13px}
  .dim .dn{width:96px;flex-shrink:0} .dim .tr{flex:1;height:6px;background:var(--soft);border-radius:4px;overflow:hidden}
  .dim .fl{height:100%;border-radius:4px} .dim .dv{width:28px;text-align:right;color:var(--muted)}
</style>
</head>
<body>
<div class="nav">
  <div class="logo">PZ</div><a class="brand" href="/" style="color:var(--text)">PageZenith</a>
  <a class="navlink" href="/">← 全部工具</a>
  <div class="grow"></div>
  <button class="keybtn" id="keybtn" onclick="SEOKEYS.open()">API Key 设置</button>
</div>
<div class="wrap" style="max-width:1000px">
  <div class="toolbar">
    <input id="url" placeholder="粘贴文章网址自动抓取（可选）…" />
    <button id="fetch" class="btn-ghost">抓取</button>
    <button id="clear" class="btn-ghost">清空</button>
    <span class="hint">或直接在下方编辑 · 首行或 <code># 标题</code> 自动识别为标题</span>
  </div>

  <div class="layout">
    <div class="ed-wrap">
      <div id="backdrop" class="ed-common" aria-hidden="true"></div>
      <textarea id="editor" class="ed-common" spellcheck="false"></textarea>
    </div>
    <div class="side">
      <div class="grade"><div class="v" id="g-grade">—</div><div class="l" id="g-verdict">可读性</div></div>
      <div class="meta">阅读 <b id="g-min">0</b> 分钟 · <b id="g-wc">0</b> 字/词 · <b id="g-sent">0</b> 句</div>
      <div id="counts"></div>
      <button class="aibtn" id="ai">AI 深度分析</button>
      <div id="ai-status" class="meta"></div>
    </div>
  </div>

  <div id="ai-report"></div>
</div>

<script src="/shared/keys.js"></script>
<script>
const $=id=>document.getElementById(id);
const E=(t,c,x)=>{const e=document.createElement(t);if(c)e.className=c;if(x!=null)e.textContent=x;return e;};
const esc=s=>s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
function isZH(t){const cjk=(t.match(/[一-鿿]/g)||[]).length, lat=(t.match(/[A-Za-z]/g)||[]).length; return (cjk+lat)>0 && cjk/(cjk+lat)>=0.2;}

// 英文音节粗估 + FK 年级
function syllables(w){w=w.toLowerCase().replace(/[^a-z]/g,"");if(!w)return 0;const m=w.match(/[aeiouy]+/g);let n=m?m.length:1;if(w.endsWith("e"))n--;return Math.max(1,n);}

const FILLERS=["其实","基本上","众所周知","总的来说","总而言之","可以说","某种程度上","我们都知道","不言而喻","毫无疑问","在很大程度上"];
// 句内词级高亮：被动>副词>复杂/填充，取不重叠区间，避免嵌套
function wordSpans(raw,zh,C){
  const ranges=[], pr={pass:0,adv:1,cplx:2};
  if(!zh){
    for(const m of raw.matchAll(/\b(is|are|was|were|be|been|being)\s+\w+ed\b/gi)) ranges.push([m.index,m.index+m[0].length,"w-pass","pass"]);
    for(const m of raw.matchAll(/\b\w{3,}ly\b/gi)) ranges.push([m.index,m.index+m[0].length,"w-adv","adv"]);
    for(const m of raw.matchAll(/\b[A-Za-z]{4,}\b/g)) if(syllables(m[0])>=4) ranges.push([m.index,m.index+m[0].length,"w-cplx","cplx"]);
  }else{
    for(const f of FILLERS){let i=0;while((i=raw.indexOf(f,i))!==-1){ranges.push([i,i+f.length,"w-cplx","cplx"]);i+=f.length;}}
  }
  ranges.sort((a,b)=>a[0]-b[0]||pr[a[3]]-pr[b[3]]);
  let html="",cur=0,last=-1;
  for(const [s,e,cls,k] of ranges){ if(s<last)continue; html+=esc(raw.slice(cur,s))+'<span class="'+cls+'">'+esc(raw.slice(s,e))+'</span>'; cur=e;last=e;C[k]++; }
  return html+esc(raw.slice(cur));
}

const ED=$("editor"), BD=$("backdrop");
ED.addEventListener("input",render);
ED.addEventListener("scroll",()=>{BD.scrollTop=ED.scrollTop;BD.scrollLeft=ED.scrollLeft;});

function render(){
  const text=ED.value;
  const zh=isZH(text);
  let html="", cursor=0;
  let nLong=0,nV=0,nSent=0,words=0,syl=0; const C={pass:0,adv:0,cplx:0};
  const sentRe = zh ? /[^。！？；\n]+[。！？；]?/g : /[^.!?]+[.!?]+|\S[^.!?]*(?=\n|$)/g;
  let m;
  while((m=sentRe.exec(text))!==null){
    const s=m.index, e=s+m[0].length;
    if(s>cursor) html+=esc(text.slice(cursor,s));
    const raw=m[0]; const trimmed=raw.trim();
    if(trimmed){
      nSent++;
      const len = zh ? trimmed.length : trimmed.split(/\s+/).filter(Boolean).length;
      if(!zh){ trimmed.split(/\s+/).forEach(w=>{if(w){words++;syl+=syllables(w);}}); }
      else { words+=trimmed.length; }
      let cls=""; if(len>(zh?60:30)){cls="s-vhard";nV++;} else if(len>(zh?40:20)){cls="s-hard";nLong++;}
      const inner=wordSpans(raw,zh,C);
      html += cls ? '<span class="'+cls+'">'+inner+'</span>' : inner;
    } else html+=esc(raw);
    cursor=e;
  }
  if(cursor<text.length) html+=esc(text.slice(cursor));
  BD.innerHTML=html+"\n";
  BD.scrollTop=ED.scrollTop;

  // 侧栏
  $("g-wc").textContent=words;
  $("g-sent").textContent=nSent;
  $("g-min").textContent=(zh?Math.max(1,Math.round(words/300)):Math.max(1,Math.round(words/200)));
  let grade="—", verdict="";
  if(words<5){grade="—";verdict="可读性";}
  else if(zh){const avg=nSent?words/nSent:0; verdict=(nV||avg>45)?"偏难":(nLong?"适中":"易读"); grade=verdict;}
  else{const fk=0.39*(words/Math.max(nSent,1))+11.8*(syl/Math.max(words,1))-15.59; const g=Math.max(1,Math.round(fk)); grade="年级 "+g; verdict=g>=12?"偏难":g>=9?"适中":"易读";}
  $("g-grade").textContent=grade; $("g-verdict").textContent=verdict;
  const counts=$("counts"); counts.innerHTML="";
  const rows = zh
    ? [["#f7c4bd","超长句",nV],["#fdeca6","长句",nLong],["#e6d8f2","填充词",C.cplx]]
    : [["#f7c4bd","超长句",nV],["#fdeca6","长句",nLong],["#cdeccf","被动语态",C.pass],["#cfe0fb","副词",C.adv],["#e6d8f2","复杂词",C.cplx]];
  rows.forEach(([c,name,n])=>{const r=E("div","srow");const sw=E("div","sw");sw.style.background=c;r.append(sw,E("span",null,name),E("span","n",String(n)));counts.append(r);});
}
// 进来即编辑器：预填示例文（立刻看到高亮效果），可清空重写
const SAMPLE=`# Forex Trading for Beginners

Forex trading is basically a thing that, as everyone knows, can be extraordinarily complicated for those individuals who are just getting started and do not really have a lot of prior experience with the international financial markets in general. The spread is the difference between the bid and the ask price. Leverage can be as high as 500 to 1. Your funds should always be protected by a properly regulated broker.`;
ED.value=SAMPLE; render();

// 清空
$("clear").addEventListener("click",()=>{ED.value="";render();ED.focus();});

// 抓取链接
$("fetch").addEventListener("click",async()=>{
  const u=$("url").value.trim();
  if(!/^https?:/.test(u)) return setS("请输入 http/https 网址。",true);
  $("fetch").disabled=true; setS("抓取中…（本地浏览器过反爬，约 10–20 秒）");
  try{
    const resp=await fetch("/api/article-quality/fetch",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({url:u,fetch_mode:"browser"})});
    if(!resp.ok) throw new Error((await resp.json()).detail||("后端 "+resp.status));
    const d=await resp.json(); ED.value=d.text||""; render(); setS("已载入正文，可编辑或点「AI 深度分析」");
  }catch(e){ setS(String(e.message||e),true); }
  finally{ $("fetch").disabled=false; }
});

// ---- AI 深度分析 ----
function syncKeyBtn(){const b=$("keybtn");if(SEOKEYS.hasKeys()){b.classList.remove("warn");b.textContent="API Key ✓";}else{b.classList.add("warn");b.textContent="① 先设置 API Key";}}
syncKeyBtn(); window.addEventListener("seo-keys-updated",syncKeyBtn);

$("ai").addEventListener("click",async()=>{
  const text=ED.value.trim();
  if(text.length<40) return setS("正文太短。",true);
  if(!SEOKEYS.hasKeys()){ setS("请先在右上角设置 API Key。",true); SEOKEYS.open(); return; }
  $("ai").disabled=true; $("ai-report").innerHTML=""; setS("分析中…约 10–20 秒",false);
  try{
    const resp=await fetch("/api/article-quality/check",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({text,...SEOKEYS.get()})});
    if(!resp.ok) throw new Error("后端 "+resp.status+"："+(await resp.text()).slice(0,300));
    renderAI(await resp.json()); setS("");
  }catch(e){ setS(String(e),true); }
  finally{ $("ai").disabled=false; }
});
function setS(m,err){const s=$("ai-status");s.textContent=m||"";s.style.color=err?"var(--red)":"var(--muted)";}
function panel(){return E("div","panel sec");}
function scoreColor(v){return v>=75?"#15a06b":v>=50?"#c9820a":"#dc4b4b";}

function applyText(orig, repl){
  let v=ED.value, i=v.indexOf(orig);
  if(i===-1){ const t=orig.trim(); i=v.indexOf(t); if(i===-1){ setS("没找到原句（可能已编辑过）",true); return; } ED.value=v.slice(0,i)+repl+v.slice(i+t.length); }
  else ED.value=v.slice(0,i)+repl+v.slice(i+orig.length);
  render(); setS("已应用到左侧编辑器 ✓");
}
function applyTitle(newTitle){
  const dt=window.__DT||"";
  if(dt && ED.value.indexOf(dt)!==-1) ED.value=ED.value.replace(dt,newTitle);
  else ED.value="# "+newTitle+"\n"+ED.value;
  render(); setS("标题已应用 ✓");
}
function renderAI(r){
  const root=$("ai-report"); root.innerHTML=""; window.__DT=r.detected_title||"";
  // 综合
  const ov=panel(); const top=E("div");top.style.display="flex";top.style.gap="16px";top.style.alignItems="center";
  const ring=E("div","ring");ring.style.background=scoreColor(r.overall_score);ring.append(E("div","nv",String(r.overall_score)),E("div","nl","综合"));
  const info=E("div");info.append(E("div",null,"AI 综合评价 · "+r.grade));if(r.verdict)info.append(E("div","meta",r.verdict));
  top.append(ring,info);ov.append(top);
  if(r.priority_actions&&r.priority_actions.length){const ul=E("ul");r.priority_actions.forEach(a=>ul.append(E("li",null,a)));ov.append(ul);}
  root.append(ov);

  // 标题
  const t=r.title; const s1=panel(); const h1=E("h2");h1.append(E("span","n","T"),E("span",null,"标题吸引力"));s1.append(h1);
  s1.append(E("div","meta",(t.detected?"识别到标题：":"未识别到明确标题：")+(r.detected_title||"（无）")+" · 评分 "+t.score));
  (t.dims||[]).forEach(d=>{const row=E("div","dim");row.append(E("div","dn",d.name));const tr=E("div","tr");const fl=E("div","fl");fl.style.width=Math.max(3,d.score)+"%";fl.style.background=scoreColor(d.score);tr.append(fl);row.append(tr,E("div","dv",String(d.score)));s1.append(row);if(d.note)s1.append(E("div","meta",d.note));});
  if((t.suggestions||[]).length){s1.append(E("div","meta","改写建议（点「应用」直接换到编辑器）："));t.suggestions.forEach(su=>{const b=E("div","tsug");const bar=E("div");bar.style.cssText="float:right;display:flex;gap:6px";const ap=E("button","apply","应用");ap.onclick=()=>applyTitle(su.title);const cp=E("button","copy","复制");cp.onclick=()=>{navigator.clipboard.writeText(su.title);cp.textContent="已复制";};bar.append(ap,cp);b.append(bar,E("div","t",su.title));if(su.why)b.append(E("div","w",su.why));s1.append(b);});}
  root.append(s1);

  // 信息密度
  const d=r.density; const s2=panel();const h2=E("h2");h2.append(E("span","n","D"),E("span",null,"信息密度"));s2.append(h2);
  s2.append(E("div","meta","密度分 "+d.score+" · 实质信息点 "+d.info_points+" · 每百词 "+d.per_100w));
  if(d.summary)s2.append(E("div",null,d.summary));
  if((d.watery||[]).length){s2.append(E("div","meta","注水/可精简："));d.watery.forEach(w=>{const b=E("div","wat");b.append(E("div","q","“"+w.quote+"”"));b.append(E("div",null,w.issue));if(w.suggestion)b.append(E("div","sg","建议："+w.suggestion));s2.append(b);});}
  root.append(s2);

  // 难句改写
  if((r.rewrites||[]).length){const s3=panel();const h3=E("h2");h3.append(E("span","n","R"),E("span",null,"难句改写"));s3.append(h3);
    r.rewrites.forEach(x=>{const b=E("div","rw");const ap=E("button","apply","应用");ap.style.float="right";ap.onclick=()=>applyText(x.original,x.rewrite);b.append(ap,E("div","o",x.original),E("div","n2","→ "+x.rewrite));s3.append(b);});root.append(s3);}
}
</script>
</body>
</html>
