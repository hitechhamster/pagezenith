<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PageZenith — AI 跨境营销工具</title>
<link rel="stylesheet" href="/shared/app.css" />
<style>
  .hero{padding:48px 0 28px;border-bottom:1px solid var(--line);margin-bottom:24px}
  .hero h1{font-size:40px;font-weight:600;margin:0 0 10px;line-height:1.1;max-width:16ch}
  .hero p{color:var(--muted);font-size:16px;margin:0;max-width:46ch;font-family:var(--font-read)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
  .tool{display:block;padding:20px;border-radius:var(--radius-lg);background:var(--card);border:1px solid var(--line);transition:border-color .15s,transform .08s}
  .tool:hover{border-color:var(--accent);transform:translateY(-1px)}
  .tool .ic{width:38px;height:38px;border-radius:10px;background:var(--accentsoft);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:19px;margin-bottom:12px}
  .tool .tt{font-family:var(--font-display);font-weight:600;font-size:17px;color:var(--text);margin-bottom:5px}
  .tool .td{color:var(--muted);font-size:13px}
  .tool.soon{opacity:.55;pointer-events:none}
  .tool.soon .tt:after{content:"即将上线";font-size:11px;color:var(--amber);background:var(--amberbg);border-radius:6px;padding:1px 7px;margin-left:8px;font-weight:500}
</style>
</head>
<body>
<div class="nav">
  <div class="logo">PZ</div><div class="brand">PageZenith</div>
  <div class="grow"></div>
  <button class="keybtn" id="keybtn" onclick="SEOKEYS.open()">API Key 设置</button>
</div>

<div class="wrap">
  <div class="hero">
    <h1>AI 跨境营销工具集</h1>
    <p>PageZenith · AI 驱动的跨境营销工具。自带 API Key，浏览器里直接用，结果不存服务器。</p>
  </div>

  <div class="grid">
    <a class="tool" href="/tools/seo-gap">
      <div class="ic">◎</div>
      <div class="tt">内容差距分析</div>
      <div class="td">对比前 10：页面类型匹配、语义意图、逐页差距、LSI 覆盖、GEO，并给出可粘贴的增补段落。</div>
    </a>
    <a class="tool" href="/tools/article-quality">
      <div class="ic">✎</div>
      <div class="tt">文章质量检测</div>
      <div class="td">Hemingway 式可读性高亮 + 信息密度（查注水）+ 标题吸引力与改写。粘贴即测，中英双语。</div>
    </a>
    <div class="tool soon">
      <div class="ic">◷</div>
      <div class="tt">更多工具</div>
      <div class="td">敬请期待。</div>
    </div>
  </div>
</div>

<script src="/shared/keys.js"></script>
<script>
  function syncKeyBtn(){ const b=document.getElementById("keybtn"); if(SEOKEYS.hasKeys()){b.classList.remove("warn");b.textContent="API Key ✓";}else{b.classList.add("warn");b.textContent="① 先设置 API Key";} }
  syncKeyBtn(); window.addEventListener("seo-keys-updated", syncKeyBtn);
</script>
</body>
</html>
